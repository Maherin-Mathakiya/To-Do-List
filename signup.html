<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>signup</title>
</head>
<body class="SignUp-body">
    <div class="SignUp-container">
        <form class="SignUp-form"  action="home.html" method="get">
            <input id="logo" type="image" src="mainlogo.jpeg" >
            <h2>SignUp</h2>
            <div class="input-container">
                <label for="username">Username</label>
                <input type="text" id="user" name="user" required pattern="^[A-Z]+[a-z]+[0-9]+$" placeholder="create username">
            </div>
            <div  class="input-container">
                <label for="contactNo">ContactNo</label>
                <input type="tel" id="no" name="no" required pattern="^[0-9]+$" placeholder="enter your number" minlength="10" maxlength="10">
            </div>
            <div  class="input-container">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="enter email">
            </div>
            <div  class="input-container">
                <label for="password">password</label>
                <input type="password" id="password" name="password" required minlength="6" maxlength="8" placeholder="create password">
            </div>
            <button type="submit" onclick="message()">Submit</button>
        </form>
    </div>
    
    //js
    <script>
        function message(){
            alert("welcome to Myplanner");
        }
    </script>
</body>
</html>
